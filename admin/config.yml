backend:
  name: git-gateway
  branch: main

media_folder: "photos/blog"
public_folder: "/photos/blog"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string", default: "Lake Jewel Hills HOA" }
      - { label: "Summary", name: "summary", widget: "text", hint: "Short description shown on the blog listing page" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
